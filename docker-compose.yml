services:
  postgres:
    image: postgres:16
    container_name: mma-bet-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmabet
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    container_name: mma-bet-api
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mmabet
    depends_on:
      - postgres

volumes:
  postgres-data:
