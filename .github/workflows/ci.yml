name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - '5432:5432'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mmabet

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification du lint
        run: npm run lint

      - name: Lancement des tests avec coverage
        run: npm run test:cov
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/mmabet
          JWT_SECRET: ci_test_secret
          JWT_EXPIRATION: 7d

      - name: Build de l'application
        run: npm run build
